<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(160deg,#1e1b4b,#3730a3,#5b21b6);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:32px 28px;max-width:420px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.35)}
.logo{text-align:center;font-size:2.5rem;margin-bottom:8px}
h1{font-size:1.3rem;font-weight:900;color:#5b21b6;text-align:center;margin-bottom:16px}
.msg{border-radius:8px;padding:10px 14px;font-size:.84rem;font-weight:600;margin-bottom:12px;display:none;line-height:1.5}
.err{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#15803d}.info{background:#dbeafe;color:#1e40af}.warn{background:#fef3c7;color:#92400e}
label{font-size:.8rem;font-weight:700;color:#374151;display:block;margin-bottom:4px;margin-top:12px}
input{width:100%;padding:11px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:.92rem;outline:none;font-family:inherit;background:#f9fafb;transition:border-color .2s}
input:focus{border-color:#7c3aed;background:#fff}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer;margin-top:14px;transition:all .2s}
.btn-main{background:#7c3aed;color:#fff}.btn-main:hover{background:#5b21b6}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;border:2px solid #e5e7eb;color:#374151;font-size:.92rem;font-weight:700;margin-top:12px}
.btn-google:hover{background:#f9fafb}
.btn:disabled{opacity:.6;cursor:not-allowed}
.div{text-align:center;font-size:.78rem;color:#9ca3af;margin:12px 0}
.fgt{text-align:center;margin-top:8px}<br>.fgt a{font-size:.78rem;color:#7c3aed;font-weight:600;cursor:pointer}
.foot{text-align:center;font-size:.78rem;color:#6b7280;margin-top:16px;line-height:1.8}
.foot a{color:#7c3aed;font-weight:700;text-decoration:none}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:16px;height:16px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
</style>
</head>
<body>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<div class="card">
  <div class="logo">🙏</div>
  <h1>Sign In</h1>
  <div class="msg" id="msg"></div>

  <button class="btn btn-google" id="btn-google" onclick="googleSignIn()">
    <img src="https://www.google.com/favicon.ico" width="18" height="18" alt="G"/>
    Continue with Google
  </button>
  <div class="div">— or use email —</div>

  <label>Email Address</label>
  <input type="email" id="email" placeholder="your@email.com" autocomplete="email"/>

  <label>Password</label>
  <input type="password" id="pass" placeholder="Your password" autocomplete="current-password"/>

  <div style="text-align:right;margin-top:6px;"><a href="#" onclick="forgotPwd()" style="font-size:.78rem;color:#7c3aed;font-weight:600;">Forgot password?</a></div>

  <button class="btn btn-main" id="btn-login" onclick="login()">Sign In</button>

  <div class="foot">
    New student? <a href="student-signup.html">Create Student Account →</a><br>
    New teacher? <a href="teacher-signup.html">Create Teacher Account →</a><br><br>
    <a href="index.html">← Back to App</a>
  </div>
</div>

<script>
let busy=false;

async function googleSignIn(){
  if(busy)return;
  busy=true;
  const g=document.getElementById('btn-google');
  g.disabled=true;g.innerHTML='<span class="spin"></span>Connecting...';
  try{
    const provider=new firebase.auth.GoogleAuthProvider();
    const result=await auth.signInWithPopup(provider);
    const u=result.user;
    let profile=null;
    try{const doc=await db.collection('users').doc(u.uid).get();if(doc.exists)profile=doc.data();}catch(e){}
    if(!profile){
      // New Google user — ask which role
      await auth.signOut();
      busy=false;g.disabled=false;g.innerHTML='<img src="https://www.google.com/favicon.ico" width="18" height="18" alt="G"/> Continue with Google';
      showMsg('New user? Please choose an account type below.','info');
      return;
    }
    // Check payment
    if(profile.status==='pending_payment'){
      saveLocal(profile,u.uid);
      localStorage.setItem('dtwd_pending_signup',JSON.stringify(profile));
      await auth.signOut();
      busy=false;
      showMsg('💳 Please complete your payment to access your dashboard.','warn');
      setTimeout(()=>{window.location.href='pricing.html?plan='+(profile.role==='teacher'?(profile.plan||'medium'):'student')+'&email='+encodeURIComponent(u.email)+'&name='+encodeURIComponent(u.displayName||'');},1500);
      return;
    }
    if(!u.emailVerified&&profile.role!=='teacher'){
      await auth.signOut();busy=false;
      g.disabled=false;g.innerHTML='<img src="https://www.google.com/favicon.ico" width="18" height="18" alt="G"/> Continue with Google';
      showMsg('Please verify your email first. Check inbox AND spam folder.','info');return;
    }
    saveLocal(profile,u.uid);
    window.location.replace(profile.role==='teacher'?'dashboard.html':'student.html');
  }catch(e){
    if(e.code!=='auth/popup-closed-by-user')showMsg(nice(e.code),'err');
    busy=false;g.disabled=false;g.innerHTML='<img src="https://www.google.com/favicon.ico" width="18" height="18" alt="G"/> Continue with Google';
  }
}

async function login(){
  if(busy)return;
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('pass').value;
  if(!email||!email.includes('@')){showMsg('Please enter a valid email.','err');return;}
  if(!pass){showMsg('Please enter your password.','err');return;}
  busy=true;
  const b=document.getElementById('btn-login');b.disabled=true;b.innerHTML='<span class="spin"></span>Signing in...';
  try{
    const cred=await auth.signInWithEmailAndPassword(email,pass);
    const u=cred.user;
    if(!u.emailVerified){
      await auth.signOut();busy=false;b.disabled=false;b.textContent='Sign In';
      showMsg('📧 Email not verified. Check inbox AND spam folder for verification email.','info');
      // Add resend button
      setTimeout(()=>{
        const el=document.getElementById('msg');
        const btn=document.createElement('button');
        btn.textContent='📧 Resend Verification Email';
        btn.style.cssText='margin-top:8px;padding:8px 16px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;width:100%;font-size:.82rem;';
        btn.onclick=async()=>{try{const c=await auth.signInWithEmailAndPassword(email,pass);await c.user.sendEmailVerification();await auth.signOut();showMsg('✅ Verification email resent. Check inbox AND spam.','ok');}catch(e2){showMsg(nice(e2.code),'err');}};
        el.appendChild(document.createElement('br'));el.appendChild(btn);
      },100);
      return;
    }
    // Get profile
    let profile=null,role='student',status='active';
    try{const doc=await db.collection('users').doc(u.uid).get();if(doc.exists){profile=doc.data();role=profile.role||'student';status=profile.status||'active';}}catch(e){}
    if(!profile){profile={uid:u.uid,name:u.displayName||u.email.split('@')[0],email:u.email,role:'student',plan:'student',status:'active',createdAt:Date.now()};try{await db.collection('users').doc(u.uid).set(profile);}catch(e2){}}
    saveLocal(profile, u.uid);
    // Students go straight to dashboard (dashboard handles payment gate)
    // Teachers need payment handled by dashboard too
    window.location.replace(role==='teacher' ? 'dashboard.html' : 'student.html');
  }catch(e){showMsg(nice(e.code||e.message),'err');busy=false;b.disabled=false;b.textContent='Sign In';}
}

async function forgotPwd(){
  const email=document.getElementById('email').value.trim();
  const e=email||prompt('Enter your email:');if(!e)return;
  try{await auth.sendPasswordResetEmail(e);showMsg('✅ Password reset email sent to '+e+'. Check inbox AND spam.','ok');}
  catch(err){showMsg(nice(err.code),'err');}
}

function saveLocal(profile,uid){
  if(profile.role==='teacher'){
    localStorage.setItem('dtwd_teacher',JSON.stringify({uid:uid||profile.uid||'',name:profile.name||'',email:profile.email||'',classCode:profile.classCode||'',plan:profile.plan||'medium',maxStudents:{small:15,medium:30,large:60,xl:100}[profile.plan]||30,status:profile.status||'active',expiresAt:profile.expiresAt||(Date.now()+90*24*60*60*1000)}));
  }else{
    localStorage.setItem('dtwd_student',JSON.stringify({uid:uid||profile.uid||'',name:profile.name||'',email:profile.email||'',classCode:profile.classCode||null,teacherName:profile.teacherName||null,plan:'student',status:profile.status||'active',purchasedAt:profile.purchasedAt||Date.now()}));
  }
}

function showMsg(t,c){const el=document.getElementById('msg');el.innerHTML=t;el.className='msg '+c;el.style.display='block';}
function nice(c){const m={'auth/user-not-found':'No account found. Please create an account.','auth/wrong-password':'Incorrect password.','auth/invalid-credential':'Email or password incorrect.','auth/invalid-login-credentials':'Email or password incorrect. Check email is verified.','auth/invalid-email':'Invalid email.','auth/too-many-requests':'Too many attempts. Wait a few minutes.','auth/network-request-failed':'Network error.'};return m[c]||'Error: '+c;}

// Auto redirect if already logged in
auth.onAuthStateChanged(async u=>{
  if(u&&u.emailVerified){
    try{const doc=await db.collection('users').doc(u.uid).get();if(doc.exists&&doc.data().status==='active'){saveLocal(doc.data(),u.uid);window.location.replace(doc.data().role==='teacher'?'dashboard.html':'student.html');}}catch(e){}
  }
});
</script>
</body>
</html>
