<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Sign In — Destroying the Works of the Devil</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --purple: #7c3aed; --purple-dark: #5b21b6; --purple-light: #ede9fe;
  --green: #16a34a; --green-dark: #15803d; --green-light: #dcfce7;
  --white: #ffffff; --gray-50: #f9fafb; --gray-100: #f3f4f6;
  --gray-200: #e5e7eb; --gray-400: #9ca3af; --gray-600: #4b5563;
  --gray-800: #1f2937; --black: #111827; --radius: 12px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(160deg, #1e1b4b 0%, #3730a3 50%, #5b21b6 100%);
  min-height: 100vh; display: flex; align-items: center;
  justify-content: center; padding: 20px;
}
.auth-card {
  background: var(--white); border-radius: 20px;
  padding: 32px 28px; max-width: 420px; width: 100%;
  box-shadow: 0 24px 60px rgba(0,0,0,0.35);
}
.auth-logo { text-align: center; font-size: 2.8rem; margin-bottom: 6px; }
.auth-title { font-size: 1.4rem; font-weight: 900; color: var(--purple-dark); text-align: center; margin-bottom: 4px; }
.auth-sub   { font-size: 0.84rem; color: var(--gray-600); text-align: center; margin-bottom: 22px; }

/* Mode tabs */
.mode-tabs { display: flex; background: var(--gray-100); border-radius: 10px; padding: 4px; margin-bottom: 20px; gap: 4px; }
.mode-tab  {
  flex: 1; padding: 9px; border: none; border-radius: 8px;
  font-size: 0.88rem; font-weight: 700; cursor: pointer;
  background: transparent; color: var(--gray-600); transition: all 0.2s;
}
.mode-tab.active { background: var(--white); color: var(--purple-dark); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

/* Role selector */
.role-label { font-size: 0.8rem; font-weight: 700; color: var(--gray-800); margin-bottom: 8px; display: block; }
.role-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
.role-opt {
  border: 2px solid var(--gray-200); border-radius: var(--radius);
  padding: 14px 10px; text-align: center; cursor: pointer;
  transition: all 0.2s; background: var(--white);
}
.role-opt:hover { border-color: var(--purple); background: var(--purple-light); }
.role-opt.selected { border-color: var(--purple); background: var(--purple-light); }
.role-opt.selected.teacher-opt { border-color: var(--green); background: var(--green-light); }
.role-icon  { font-size: 1.8rem; margin-bottom: 5px; }
.role-name  { font-size: 0.85rem; font-weight: 800; color: var(--black); }
.role-desc  { font-size: 0.7rem; color: var(--gray-600); margin-top: 2px; }

/* Form fields */
.field-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.auth-input {
  width: 100%; padding: 11px 14px; border: 2px solid var(--gray-200);
  border-radius: 10px; font-size: 0.92rem; outline: none;
  font-family: inherit; transition: border-color 0.2s; background: var(--gray-50);
}
.auth-input:focus { border-color: var(--purple); background: var(--white); }
.auth-input.error { border-color: #ef4444; }

/* Plan selector for teachers */
.plan-select {
  width: 100%; padding: 11px 14px; border: 2px solid var(--gray-200);
  border-radius: 10px; font-size: 0.88rem; outline: none;
  font-family: inherit; background: var(--gray-50); cursor: pointer;
}
.plan-select:focus { border-color: var(--green); }

/* Buttons */
.btn-auth {
  width: 100%; padding: 13px; border: none; border-radius: 12px;
  font-size: 1rem; font-weight: 800; cursor: pointer;
  transition: all 0.2s; margin-bottom: 12px; letter-spacing: 0.3px;
}
.btn-student { background: var(--purple); color: var(--white); }
.btn-student:hover { background: var(--purple-dark); }
.btn-teacher { background: var(--green); color: var(--white); }
.btn-teacher:hover { background: var(--green-dark); }
.btn-google {
  width: 100%; padding: 11px; border: 2px solid var(--gray-200);
  border-radius: 12px; background: var(--white); font-size: 0.9rem;
  font-weight: 700; cursor: pointer; transition: all 0.2s;
  color: var(--gray-800); display: flex; align-items: center;
  justify-content: center; gap: 10px; margin-bottom: 10px;
}
.btn-google:hover { background: var(--gray-50); }

/* Divider */
.auth-divider { text-align: center; font-size: 0.78rem; color: var(--gray-400); margin: 10px 0; }

/* Error / success messages */
.auth-error {
  background: #fee2e2; color: #991b1b; border-radius: 8px;
  padding: 10px 14px; font-size: 0.84rem; font-weight: 600;
  margin-bottom: 12px; display: none;
}
.auth-success {
  background: var(--green-light); color: var(--green-dark); border-radius: 8px;
  padding: 10px 14px; font-size: 0.84rem; font-weight: 600;
  margin-bottom: 12px; display: none;
}

/* Footer */
.auth-footer { text-align: center; font-size: 0.78rem; color: var(--gray-600); margin-top: 16px; }
.auth-footer a { color: var(--purple); font-weight: 700; text-decoration: none; }

/* Loading */
.btn-loading { opacity: 0.7; cursor: not-allowed; }

/* Teacher plan info */
.plan-info {
  background: var(--green-light); border-radius: 8px;
  padding: 8px 12px; font-size: 0.78rem; color: var(--green-dark);
  font-weight: 600; margin-top: -6px; margin-bottom: 10px;
  display: none;
}

/* Password strength */
.pwd-strength { font-size: 0.72rem; margin-top: -6px; margin-bottom: 2px; font-weight: 700; }
.pwd-weak   { color: #ef4444; }
.pwd-medium { color: #d97706; }
.pwd-strong { color: var(--green-dark); }

@media (max-width: 380px) {
  .auth-card { padding: 24px 18px; }
  .role-options { grid-template-columns: 1fr 1fr; gap: 8px; }
}
</style>
</head>
<body>

<div class="auth-card">
  <div class="auth-logo">🙏</div>
  <h1 class="auth-title">Destroying the Works<br>of the Devil</h1>
  <p class="auth-sub">Interactive Bible Study — Book of Luke</p>

  <!-- LOGIN / SIGNUP TABS -->
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-login" onclick="switchMode('login')">Sign In</button>
    <button class="mode-tab" id="tab-signup" onclick="switchMode('signup')">Create Account</button>
  </div>

  <!-- ERROR / SUCCESS -->
  <div class="auth-error" id="auth-error"></div>
  <div class="auth-success" id="auth-success"></div>

  <!-- ROLE SELECTOR (shown on signup) -->
  <div id="role-section" style="display:none;">
    <span class="role-label">I am a:</span>
    <div class="role-options">
      <div class="role-opt student-opt" id="role-student" onclick="selectRole('student')">
        <div class="role-icon">👤</div>
        <div class="role-name">Student</div>
        <div class="role-desc">$7 one time</div>
      </div>
      <div class="role-opt teacher-opt" id="role-teacher" onclick="selectRole('teacher')">
        <div class="role-icon">👨‍🏫</div>
        <div class="role-name">Teacher</div>
        <div class="role-desc">From $30 / 3 months</div>
      </div>
    </div>
  </div>

  <!-- TEACHER PLAN (shown when teacher selected on signup) -->
  <div id="teacher-plan-section" style="display:none;">
    <span class="role-label">Select your class plan:</span>
    <select class="plan-select" id="teacher-plan" onchange="updatePlanInfo()">
      <option value="">— Choose your plan —</option>
      <option value="small">Small Group — Up to 15 students — $30</option>
      <option value="medium">Medium Group — Up to 30 students — $60</option>
      <option value="large">Large Group — Up to 60 students — $120</option>
      <option value="xl">Extra Large — Up to 100 students — $300</option>
    </select>
    <div class="plan-info" id="plan-info"></div>
  </div>

  <!-- GOOGLE SIGN IN -->
  <button class="btn-google" onclick="signInGoogle()">
    <img src="https://www.google.com/favicon.ico" width="18" height="18" alt="G"/>
    <span id="google-btn-text">Continue with Google</span>
  </button>
  <div class="auth-divider">— or use email —</div>

  <!-- EMAIL FORM -->
  <div class="field-group">
    <div id="name-field" style="display:none;">
      <input type="text" class="auth-input" id="auth-name" placeholder="Full name" autocomplete="name"/>
    </div>
    <input type="email" class="auth-input" id="auth-email" placeholder="Email address" autocomplete="email"/>
    <div>
      <input type="password" class="auth-input" id="auth-pass" placeholder="Password"
        autocomplete="current-password" oninput="checkPasswordStrength(this.value)"/>
      <div class="pwd-strength" id="pwd-strength"></div>
    </div>
    <div id="confirm-field" style="display:none;">
      <input type="password" class="auth-input" id="auth-confirm" placeholder="Confirm password" autocomplete="new-password"/>
    </div>
  </div>

  <!-- SUBMIT BUTTON -->
  <button class="btn-auth btn-student" id="btn-submit" onclick="handleSubmit()">
    Sign In
  </button>

  <!-- FOOTER -->
  <div class="auth-footer" id="auth-footer-text">
    Don't have an account? <a href="#" onclick="switchMode('signup'); return false;">Create one free →</a>
  </div>
  <div class="auth-footer" style="margin-top:8px;">
    <a href="index.html">← Back to App</a> &nbsp;|&nbsp;
    <a href="pricing.html">View Pricing</a>
  </div>
</div>

<script>
// ===== STATE =====
let currentMode = 'login';   // 'login' | 'signup'
let currentRole = 'student'; // 'student' | 'teacher'

// ===== TEST STRIPE KEYS (visible to client for testing) =====
// These are PUBLIC test keys — safe to include in frontend code
// Use these to test payments without real money
const STRIPE_TEST_KEY = 'pk_test_51OexampleTestKeyReplaceWithYours';

// ===== PLAN INFO =====
const PLAN_DETAILS = {
  small:  { label: '✅ Up to 15 students | 3-month class | Full teacher dashboard', price: 30 },
  medium: { label: '✅ Up to 30 students | 3-month class | Full teacher dashboard', price: 60 },
  large:  { label: '✅ Up to 60 students | 3-month class | Full teacher dashboard', price: 120 },
  xl:     { label: '✅ Up to 100 students | 3-month class | Full teacher dashboard', price: 300 }
};

// ===== SWITCH MODE =====
function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');

  // Show/hide fields
  document.getElementById('role-section').style.display      = mode === 'signup' ? 'block' : 'none';
  document.getElementById('name-field').style.display        = mode === 'signup' ? 'block' : 'none';
  document.getElementById('confirm-field').style.display     = mode === 'signup' ? 'block' : 'none';

  // Reset teacher plan on mode switch
  if (mode === 'login') {
    document.getElementById('teacher-plan-section').style.display = 'none';
    document.getElementById('auth-pass').setAttribute('autocomplete', 'current-password');
  } else {
    document.getElementById('auth-pass').setAttribute('autocomplete', 'new-password');
    selectRole('student'); // default role
  }

  // Update button and footer
  const btn = document.getElementById('btn-submit');
  if (mode === 'login') {
    btn.textContent = 'Sign In';
    btn.className = 'btn-auth btn-student';
    document.getElementById('auth-footer-text').innerHTML =
      'Don\'t have an account? <a href="#" onclick="switchMode(\'signup\'); return false;">Create one free →</a>';
    document.getElementById('google-btn-text').textContent = 'Continue with Google';
  } else {
    updateButtonForRole();
    document.getElementById('auth-footer-text').innerHTML =
      'Already have an account? <a href="#" onclick="switchMode(\'login\'); return false;">Sign in →</a>';
    document.getElementById('google-btn-text').textContent = 'Sign up with Google';
  }

  clearMessages();
}

// ===== SELECT ROLE =====
function selectRole(role) {
  currentRole = role;
  document.getElementById('role-student').classList.toggle('selected', role === 'student');
  document.getElementById('role-teacher').classList.toggle('selected', role === 'teacher');
  document.getElementById('teacher-plan-section').style.display = role === 'teacher' ? 'block' : 'none';
  updateButtonForRole();
}

function updateButtonForRole() {
  const btn = document.getElementById('btn-submit');
  if (currentMode === 'signup') {
    if (currentRole === 'student') {
      btn.textContent = 'Create Student Account — $7';
      btn.className = 'btn-auth btn-student';
    } else {
      const plan = document.getElementById('teacher-plan').value;
      const price = plan && PLAN_DETAILS[plan] ? '$' + PLAN_DETAILS[plan].price : '';
      btn.textContent = 'Create Teacher Account' + (price ? ' — ' + price : '');
      btn.className = 'btn-auth btn-teacher';
    }
  }
}

function updatePlanInfo() {
  const plan = document.getElementById('teacher-plan').value;
  const infoEl = document.getElementById('plan-info');
  if (plan && PLAN_DETAILS[plan]) {
    infoEl.textContent = PLAN_DETAILS[plan].label;
    infoEl.style.display = 'block';
  } else {
    infoEl.style.display = 'none';
  }
  updateButtonForRole();
}

// ===== PASSWORD STRENGTH =====
function checkPasswordStrength(pwd) {
  const el = document.getElementById('pwd-strength');
  if (!pwd || currentMode === 'login') { el.textContent = ''; return; }
  if (pwd.length < 6) {
    el.textContent = '⚠️ Too short (min 6 characters)';
    el.className = 'pwd-strength pwd-weak';
  } else if (pwd.length < 8 || !/[0-9]/.test(pwd)) {
    el.textContent = '⚡ Fair — add numbers or symbols';
    el.className = 'pwd-strength pwd-medium';
  } else {
    el.textContent = '✅ Strong password';
    el.className = 'pwd-strength pwd-strong';
  }
}

// ===== VALIDATION =====
function validate() {
  const email   = document.getElementById('auth-email').value.trim();
  const pass    = document.getElementById('auth-pass').value;
  const name    = document.getElementById('auth-name').value.trim();
  const confirm = document.getElementById('auth-confirm').value;

  if (!email || !email.includes('@')) { showError('Please enter a valid email address.'); return false; }
  if (!pass || pass.length < 6)       { showError('Password must be at least 6 characters.'); return false; }

  if (currentMode === 'signup') {
    if (!name)                        { showError('Please enter your full name.'); return false; }
    if (pass !== confirm)             { showError('Passwords do not match.'); return false; }
    if (currentRole === 'teacher') {
      const plan = document.getElementById('teacher-plan').value;
      if (!plan)                      { showError('Please select a teacher plan.'); return false; }
    }
  }
  return true;
}

// ===== HANDLE SUBMIT =====
async function handleSubmit() {
  if (!validate()) return;

  const btn = document.getElementById('btn-submit');
  btn.classList.add('btn-loading');
  btn.textContent = '⏳ Please wait...';
  clearMessages();

  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  const name  = document.getElementById('auth-name').value.trim();
  const role  = currentRole;
  const plan  = currentRole === 'teacher' ? document.getElementById('teacher-plan').value : 'student';

  try {
    if (currentMode === 'login') {
      await doLogin(email, pass);
    } else {
      await doSignup(email, pass, name, role, plan);
    }
  } catch(e) {
    showError(e.message || 'Something went wrong. Please try again.');
    btn.classList.remove('btn-loading');
    updateButtonForRole();
    if (currentMode === 'login') btn.textContent = 'Sign In';
  }
}

// ===== LOGIN =====
async function doLogin(email, pass) {
  // Simulate API call — replace with Firebase Auth in production
  await wait(1200);

  // Check localStorage for demo accounts
  const accounts = getAccounts();
  const user = accounts.find(a => a.email === email && a.pass === pass);

  if (!user) {
    // Demo fallback
    if (email.includes('@') && pass.length >= 6) {
      // For testing: accept any valid looking credentials
      const demoRole = email.includes('teacher') ? 'teacher' : 'student';
      redirectUser({ email, name: email.split('@')[0], role: demoRole, plan: demoRole === 'teacher' ? 'medium' : 'student' });
      return;
    }
    throw new Error('Email or password is incorrect. Please try again.');
  }

  redirectUser(user);
}

// ===== SIGNUP =====
async function doSignup(email, pass, name, role, plan) {
  await wait(1500);

  // Check if already exists
  const accounts = getAccounts();
  if (accounts.find(a => a.email === email)) {
    throw new Error('An account with this email already exists. Please sign in instead.');
  }

  // For teacher: initiate payment first
  if (role === 'teacher') {
    const price = PLAN_DETAILS[plan].price;
    // Save pending account
    const pending = { email, pass, name, role, plan, status: 'pending_payment', createdAt: Date.now() };
    localStorage.setItem('dtwd_pending_signup', JSON.stringify(pending));
    // Redirect to pricing with pre-selected plan
    showSuccess('Account ready! Redirecting to payment...');
    await wait(1500);
    window.location.href = 'pricing.html?plan=' + plan + '&email=' + encodeURIComponent(email) + '&name=' + encodeURIComponent(name);
    return;
  }

  // Student: redirect to payment then activate
  const pending = { email, pass, name, role, plan: 'student', status: 'pending_payment', createdAt: Date.now() };
  localStorage.setItem('dtwd_pending_signup', JSON.stringify(pending));
  showSuccess('Account ready! Redirecting to payment ($7)...');
  await wait(1500);
  window.location.href = 'pricing.html?plan=student&email=' + encodeURIComponent(email) + '&name=' + encodeURIComponent(name);
}

// ===== GOOGLE SIGN IN =====
async function signInGoogle() {
  clearMessages();
  // Simulate Google OAuth — replace with Firebase Google Auth in production
  await wait(800);
  const role = currentMode === 'signup' ? currentRole : 'student';
  const demoUser = {
    email: 'demo@gmail.com',
    name: 'Demo User',
    role,
    plan: role === 'teacher' ? 'medium' : 'student',
    googleAuth: true
  };

  if (currentMode === 'signup' && role === 'teacher') {
    const plan = document.getElementById('teacher-plan').value;
    if (!plan) { showError('Please select a teacher plan before continuing.'); return; }
    demoUser.plan = plan;
    localStorage.setItem('dtwd_pending_signup', JSON.stringify({ ...demoUser, status: 'pending_payment' }));
    window.location.href = 'pricing.html?plan=' + plan + '&email=' + encodeURIComponent(demoUser.email);
    return;
  }

  redirectUser(demoUser);
}

// ===== REDIRECT BASED ON ROLE =====
function redirectUser(user) {
  // Save current user session
  localStorage.setItem('dtwd_current_user', JSON.stringify(user));

  // KEY: redirect ONLY to the correct dashboard based on role
  if (user.role === 'teacher') {
    localStorage.setItem('dtwd_teacher', JSON.stringify({
      name: user.name,
      email: user.email,
      classCode: 'DTWD-' + Math.random().toString(36).substring(2,8).toUpperCase(),
      plan: user.plan,
      maxStudents: { small:15, medium:30, large:60, xl:100 }[user.plan] || 30,
      expiresAt: Date.now() + (90 * 24 * 60 * 60 * 1000)
    }));
    showSuccess('Welcome back! Redirecting to Teacher Dashboard...');
    setTimeout(() => window.location.href = 'dashboard.html', 1200);
  } else {
    localStorage.setItem('dtwd_student', JSON.stringify({
      name: user.name,
      email: user.email,
      classCode: null,
      teacherName: null,
      plan: 'student',
      purchasedAt: Date.now()
    }));
    showSuccess('Welcome! Redirecting to your Student Dashboard...');
    setTimeout(() => window.location.href = 'student.html', 1200);
  }
}

// ===== ACCOUNT STORAGE =====
function getAccounts() {
  try { return JSON.parse(localStorage.getItem('dtwd_accounts') || '[]'); } catch(e) { return []; }
}
function saveAccount(user) {
  const accounts = getAccounts();
  accounts.push(user);
  localStorage.setItem('dtwd_accounts', JSON.stringify(accounts));
}

// ===== MESSAGES =====
function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
  document.getElementById('auth-success').style.display = 'none';
  // Reset button
  const btn = document.getElementById('btn-submit');
  btn.classList.remove('btn-loading');
  if (currentMode === 'login') btn.textContent = 'Sign In';
  else updateButtonForRole();
}

function showSuccess(msg) {
  const el = document.getElementById('auth-success');
  el.textContent = '✅ ' + msg;
  el.style.display = 'block';
  document.getElementById('auth-error').style.display = 'none';
}

function clearMessages() {
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-success').style.display = 'none';
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

// ===== CHECK URL PARAMS =====
// If coming back from payment, auto-activate account
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  if (params.get('payment') === 'success') {
    const pending = localStorage.getItem('dtwd_pending_signup');
    if (pending) {
      const user = JSON.parse(pending);
      user.status = 'active';
      saveAccount(user);
      localStorage.removeItem('dtwd_pending_signup');
      redirectUser(user);
    }
  }

  // Pre-select role from URL
  const roleParam = params.get('role');
  if (roleParam === 'teacher') { switchMode('signup'); selectRole('teacher'); }
  else if (roleParam === 'student') { switchMode('signup'); }
});
</script>
</body>
</html>
