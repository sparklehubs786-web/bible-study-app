<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Teacher Sign Up</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(160deg,#14532d,#15803d,#166534);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:32px 28px;max-width:440px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.35)}
.icon{text-align:center;font-size:2.5rem;margin-bottom:6px}
h1{font-size:1.2rem;font-weight:900;color:#15803d;text-align:center;margin-bottom:4px}
.badge{display:block;text-align:center;background:#dcfce7;color:#15803d;font-size:.82rem;font-weight:800;padding:4px 14px;border-radius:20px;margin:0 auto 16px}
.msg{border-radius:8px;padding:10px 14px;font-size:.84rem;font-weight:600;margin-bottom:12px;display:none;line-height:1.5}
.err{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#15803d}
label{font-size:.8rem;font-weight:700;color:#374151;display:block;margin-bottom:4px;margin-top:10px}
input,select{width:100%;padding:11px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:.92rem;outline:none;font-family:inherit;background:#f9fafb}
input:focus,select:focus{border-color:#16a34a;background:#fff}
.ps{font-size:.72rem;font-weight:700;margin-top:3px}.pw{color:#ef4444}.pm{color:#d97706}.pg{color:#15803d}
.plan-info{background:#dcfce7;border-radius:8px;padding:8px 12px;font-size:.78rem;color:#15803d;font-weight:600;margin-top:6px;display:none}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer;margin-top:14px;transition:all .2s}
.btn-main{background:#16a34a;color:#fff}.btn-main:hover{background:#15803d}
.btn-g{display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;border:2px solid #e5e7eb;color:#374151;font-size:.92rem;font-weight:700;margin-top:10px}
.btn-g:hover{background:#f9fafb}.btn:disabled{opacity:.6;cursor:not-allowed}
.div{text-align:center;font-size:.78rem;color:#9ca3af;margin:10px 0}
.note{background:#dbeafe;border-radius:8px;padding:10px 12px;font-size:.8rem;color:#1e40af;font-weight:600;margin-top:10px;line-height:1.5}
.foot{text-align:center;font-size:.78rem;color:#6b7280;margin-top:14px;line-height:1.8}
.foot a{color:#16a34a;font-weight:700;text-decoration:none}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:16px;height:16px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
</style>
</head>
<body>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<div class="card">
  <div class="icon">👨‍🏫</div>
  <h1>Create Teacher Account</h1>
  <span class="badge">3-month class subscription</span>
  <div class="msg" id="msg"></div>

  <label>Select Your Class Plan</label>
  <select id="plan" onchange="onPlan()">
    <option value="">— Choose your plan —</option>
    <option value="small">Small Group — up to 15 students — $30</option>
    <option value="medium">Medium Group — up to 30 students — $60</option>
    <option value="large">Large Group — up to 60 students — $120</option>
    <option value="xl">Extra Large — up to 100 students — $300</option>
  </select>
  <div class="plan-info" id="plan-info"></div>

  <button class="btn btn-g" id="btn-g" onclick="googleSignup()"><img src="https://www.google.com/favicon.ico" width="18" height="18" alt="G"/> Sign up with Google</button>
  <div class="div">— or use email —</div>
  <div class="note">📧 A verification email will be sent. Check <strong>inbox AND spam</strong> folder.</div>

  <label>Full Name</label><input type="text" id="name" placeholder="Your full name" autocomplete="name"/>
  <label>Email Address</label><input type="email" id="email" placeholder="your@email.com" autocomplete="email"/>
  <label>Password</label><input type="password" id="pass" placeholder="Min 6 characters" autocomplete="new-password" oninput="pwStr(this.value)"/>
  <div class="ps" id="pws"></div>
  <label>Confirm Password</label><input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password"/>

  <button class="btn btn-main" id="btn-s" onclick="signup()">Create Teacher Account</button>
  <div class="foot">Already have an account? <a href="signin.html">Sign In →</a><br>Are you a student? <a href="student-signup.html">Student Sign Up →</a></div>
</div>
<script>
let busy=false;
const PL={small:{p:30,max:15},medium:{p:60,max:30},large:{p:120,max:60},xl:{p:300,max:100}};
function onPlan(){const v=document.getElementById('plan').value,pi=document.getElementById('plan-info');if(v&&PL[v]){pi.textContent='✅ $'+PL[v].p+' for 3 months — up to '+PL[v].max+' students';pi.style.display='block';}else pi.style.display='none';const b=document.getElementById('btn-s');b.textContent='Create Teacher Account'+(v&&PL[v]?' — $'+PL[v].p:'');}
function pwStr(v){const el=document.getElementById('pws');if(!v){el.textContent='';return;}if(v.length<6){el.className='ps pw';el.textContent='⚠️ Too short';}else if(v.length<8||!/[0-9]/.test(v)){el.className='ps pm';el.textContent='⚡ Add numbers';}else{el.className='ps pg';el.textContent='✅ Strong';}}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='DTWD-';for(let i=0;i<6;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}

async function googleSignup(){
  if(busy)return;
  const pv=document.getElementById('plan').value;
  if(!pv){showMsg('Please select a class plan first.','err');return;}
  busy=true;const g=document.getElementById('btn-g');g.disabled=true;g.innerHTML='<span class="spin"></span>Please wait...';
  try{
    const r=await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    const u=r.user;
    const doc=await db.collection('users').doc(u.uid).get().catch(()=>null);
    if(doc&&doc.exists&&doc.data().status==='active'){window.location.replace('dashboard.html');return;}
    const classCode=genCode();
    const profile={uid:u.uid,name:u.displayName||'',email:u.email,role:'teacher',plan:pv,classCode,maxStudents:PL[pv].max,teacherName:u.displayName||'',createdAt:Date.now(),status:'pending_payment',expiresAt:Date.now()+(90*24*60*60*1000)};
    await db.collection('users').doc(u.uid).set(profile,{merge:true}).catch(()=>{});
    localStorage.setItem('dtwd_teacher',JSON.stringify(profile));localStorage.setItem('dtwd_pending_signup',JSON.stringify(profile));
    await auth.signOut();
    window.location.href='pricing.html?plan='+pv+'&email='+encodeURIComponent(u.email)+'&name='+encodeURIComponent(u.displayName||'');
  }catch(e){if(e.code!=='auth/popup-closed-by-user')showMsg(nice(e.code),'err');busy=false;g.disabled=false;g.innerHTML='<img src="https://www.google.com/favicon.ico" width="18" height="18" alt="G"/> Sign up with Google';}
}

async function signup(){
  if(busy)return;
  const pv=document.getElementById('plan').value;
  if(!pv){showMsg('Please select a class plan.','err');return;}
  const name=document.getElementById('name').value.trim(),email=document.getElementById('email').value.trim(),pass=document.getElementById('pass').value,confirm=document.getElementById('confirm').value;
  if(!name){showMsg('Please enter your full name.','err');return;}
  if(!email||!email.includes('@')){showMsg('Please enter a valid email.','err');return;}
  if(!pass||pass.length<6){showMsg('Password must be at least 6 characters.','err');return;}
  if(pass!==confirm){showMsg('Passwords do not match.','err');return;}
  busy=true;const b=document.getElementById('btn-s');b.disabled=true;b.innerHTML='<span class="spin"></span>Creating...';
  try{
    const cred=await auth.createUserWithEmailAndPassword(email,pass);const u=cred.user;
    await u.updateProfile({displayName:name}).catch(()=>{});await u.sendEmailVerification().catch(()=>{});
    const classCode=genCode();
    const profile={uid:u.uid,name,email,role:'teacher',plan:pv,classCode,maxStudents:PL[pv].max,teacherName:name,createdAt:Date.now(),status:'pending_payment',expiresAt:Date.now()+(90*24*60*60*1000)};
    await db.collection('users').doc(u.uid).set(profile).catch(()=>{});
    localStorage.setItem('dtwd_teacher',JSON.stringify(profile));localStorage.setItem('dtwd_pending_signup',JSON.stringify(profile));
    await auth.signOut();
    showMsg('✅ Teacher account created! Verification email sent to <strong>'+email+'</strong>. Check inbox AND spam. After verifying, sign in and complete payment.','ok');
    setTimeout(()=>{window.location.href='pricing.html?plan='+pv+'&email='+encodeURIComponent(email)+'&name='+encodeURIComponent(name);},3000);
  }catch(e){showMsg(nice(e.code),'err');busy=false;b.disabled=false;b.textContent='Create Teacher Account';}
}
function showMsg(t,c){const el=document.getElementById('msg');el.innerHTML=t;el.className='msg '+c;el.style.display='block';}
function nice(c){const m={'auth/email-already-in-use':'Account already exists. Please <a href="signin.html">sign in</a>.','auth/invalid-email':'Invalid email.','auth/weak-password':'Password too weak.','auth/network-request-failed':'Network error.'};return m[c]||'Error: '+c;}
</script>
</body>
</html>
