<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Student Sign Up</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(160deg,#1e1b4b,#3730a3,#5b21b6);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:32px 28px;max-width:420px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.35)}
.icon{text-align:center;font-size:2.5rem;margin-bottom:6px}
h1{font-size:1.2rem;font-weight:900;color:#5b21b6;text-align:center;margin-bottom:4px}
.sub{font-size:.82rem;color:#6b7280;text-align:center;margin-bottom:16px}
.msg{border-radius:8px;padding:10px 14px;font-size:.84rem;font-weight:600;margin-bottom:12px;display:none;line-height:1.5}
.err{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#15803d}
label{font-size:.8rem;font-weight:700;color:#374151;display:block;margin-bottom:4px;margin-top:10px}
input{width:100%;padding:11px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:.92rem;outline:none;font-family:inherit;background:#f9fafb}
input:focus{border-color:#7c3aed;background:#fff}
.ps{font-size:.72rem;font-weight:700;margin-top:3px}.pw{color:#ef4444}.pm{color:#d97706}.pg{color:#15803d}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer;margin-top:14px;transition:all .2s}
.btn-main{background:#7c3aed;color:#fff}.btn-main:hover{background:#5b21b6}
.btn-g{display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;border:2px solid #e5e7eb;color:#374151;font-size:.92rem;font-weight:700;margin-top:10px}
.btn-g:hover{background:#f9fafb}.btn:disabled{opacity:.6;cursor:not-allowed}
.div{text-align:center;font-size:.78rem;color:#9ca3af;margin:10px 0}
.note{background:#dbeafe;border-radius:8px;padding:10px 12px;font-size:.8rem;color:#1e40af;font-weight:600;margin-top:10px;line-height:1.5}
.foot{text-align:center;font-size:.78rem;color:#6b7280;margin-top:14px;line-height:1.8}
.foot a{color:#7c3aed;font-weight:700;text-decoration:none}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:16px;height:16px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
</style>
</head>
<body>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<div class="card">
  <div class="icon">👤</div>
  <h1>Create Student Account</h1>
  <p class="sub">Sign up free · Unlock full access for $7 inside the app</p>
  <div class="msg" id="msg"></div>

  <button class="btn btn-g" id="btn-g" onclick="googleSignup()">
    <img src="https://www.google.com/favicon.ico" width="18" height="18" alt="G"/> Sign up with Google
  </button>
  <div class="div">— or use email —</div>

  <div class="note">📧 A verification email will be sent. Check <strong>inbox AND spam</strong> folder and click the link before signing in.</div>

  <label>Full Name</label>
  <input type="text" id="name" placeholder="Your full name" autocomplete="name"/>
  <label>Email Address</label>
  <input type="email" id="email" placeholder="your@email.com" autocomplete="email"/>
  <label>Password</label>
  <input type="password" id="pass" placeholder="Min 6 characters" autocomplete="new-password" oninput="pwStr(this.value)"/>
  <div class="ps" id="pws"></div>
  <label>Confirm Password</label>
  <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password"/>

  <button class="btn btn-main" id="btn-s" onclick="signup()">Create Free Account →</button>
  <div class="foot">Already have an account? <a href="signin.html">Sign In →</a><br>Are you a teacher? <a href="teacher-signup.html">Teacher Sign Up →</a></div>
</div>
<script>
let busy = false;

function pwStr(v){
  const el=document.getElementById('pws');
  if(!v){el.textContent='';return;}
  if(v.length<6){el.className='ps pw';el.textContent='⚠️ Too short';}
  else if(v.length<8||!/[0-9]/.test(v)){el.className='ps pm';el.textContent='⚡ Add numbers';}
  else{el.className='ps pg';el.textContent='✅ Strong';}
}

// Google signup — go straight to student dashboard (dashboard handles payment gate)
async function googleSignup(){
  if(busy)return; busy=true;
  const g=document.getElementById('btn-g');
  g.disabled=true; g.innerHTML='<span class="spin"></span>Please wait...';
  try{
    const r=await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    const u=r.user;

    // Check if already has active account
    let existingStatus='pending_payment';
    try{
      const doc=await db.collection('users').doc(u.uid).get();
      if(doc.exists) existingStatus=doc.data().status||'pending_payment';
    }catch(e){}

    // Save profile to Firestore and localStorage
    const profile={uid:u.uid,name:u.displayName||'',email:u.email,role:'student',plan:'student',classCode:null,teacherName:null,createdAt:Date.now(),status:existingStatus};
    await db.collection('users').doc(u.uid).set(profile,{merge:true}).catch(()=>{});
    localStorage.setItem('dtwd_student',JSON.stringify(profile));

    // Go directly to student dashboard — it will show payment gate if needed
    window.location.replace('student.html');
  }catch(e){
    if(e.code!=='auth/popup-closed-by-user') showMsg(nice(e.code),'err');
    busy=false; g.disabled=false;
    g.innerHTML='<img src="https://www.google.com/favicon.ico" width="18" height="18" alt="G"/> Sign up with Google';
  }
}

// Email signup — send verification then go to signin to verify first
async function signup(){
  if(busy)return;
  const name=document.getElementById('name').value.trim();
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('pass').value;
  const confirm=document.getElementById('confirm').value;
  if(!name){showMsg('Please enter your full name.','err');return;}
  if(!email||!email.includes('@')){showMsg('Please enter a valid email.','err');return;}
  if(!pass||pass.length<6){showMsg('Password must be at least 6 characters.','err');return;}
  if(pass!==confirm){showMsg('Passwords do not match.','err');return;}

  busy=true;
  const b=document.getElementById('btn-s');
  b.disabled=true; b.innerHTML='<span class="spin"></span>Creating account...';

  try{
    const cred=await auth.createUserWithEmailAndPassword(email,pass);
    const u=cred.user;
    await u.updateProfile({displayName:name}).catch(()=>{});
    await u.sendEmailVerification().catch(e=>console.warn('verify email:',e));

    // Save profile — status pending_payment
    const profile={uid:u.uid,name,email,role:'student',plan:'student',classCode:null,teacherName:null,createdAt:Date.now(),status:'pending_payment'};
    await db.collection('users').doc(u.uid).set(profile).catch(()=>{});
    localStorage.setItem('dtwd_student',JSON.stringify(profile));

    // Sign out so they verify email first
    await auth.signOut();

    showMsg('✅ Account created! A verification email was sent to <strong>'+email+'</strong>.<br><br>Check your <strong>inbox AND spam</strong> folder, click the verification link, then sign in.','ok');
    setTimeout(()=>{ window.location.href='signin.html'; }, 3500);

  }catch(e){
    showMsg(nice(e.code),'err');
    busy=false; b.disabled=false; b.textContent='Create Free Account →';
  }
}

function showMsg(t,c){const el=document.getElementById('msg');el.innerHTML=t;el.className='msg '+c;el.style.display='block';}
function nice(c){
  const m={
    'auth/email-already-in-use':'An account with this email already exists. <a href="signin.html">Sign in instead →</a>',
    'auth/invalid-email':'Please enter a valid email address.',
    'auth/weak-password':'Password is too weak. Use at least 6 characters.',
    'auth/network-request-failed':'Network error. Please check your internet.'
  };
  return m[c]||('Error: '+c+'. Please try again.');
}
</script>
</body>
</html>
